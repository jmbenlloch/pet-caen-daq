version: "3"

env:
  GOCACHE: "{{.ROOT_DIR}}/.cache/go-build"
  GOMODCACHE: "{{.ROOT_DIR}}/.cache/go-mod"

vars:
  GO_PACKAGES: ./backend/...
  BUILD_IMAGE: '{{default "pet-caen-daq-build:latest" .PET_CAEN_BUILD_IMAGE}}'

tasks:
  default:
    desc: List available project tasks
    cmds:
      - task --list

  generate:
    desc: Generate protobuf and ConnectRPC Go and TypeScript bindings
    cmds:
      - PATH="{{.ROOT_DIR}}/frontend/node_modules/.bin:$PATH" buf generate

  format:
    desc: Format project source
    cmds:
      - gofmt -w backend
      - npm --prefix frontend run format

  format:check:
    desc: Check source formatting without modifying files
    cmds:
      - test -z "$(gofmt -l backend)"
      - npm --prefix frontend run format:check

  lint:
    desc: Run static and schema checks
    deps: [format:check]
    cmds:
      - go vet {{.GO_PACKAGES}}
      - buf lint
      - npm --prefix frontend run lint

  test:unit:
    desc: Run Go unit tests
    cmds:
      - go test {{.GO_PACKAGES}}
      - npm --prefix frontend run test

  test:integration:
    desc: Run Go integration tests
    cmds:
      - go test -tags=integration ./backend/integration/...

  test:capture:
    desc: Replay the external JANUS data-taking PCAP through production decoders
    cmds:
      - go test -tags=integration,capture ./backend/integration/... -run 'Test(JANUSDataTakingCaptureConformance|NativeRunRawCaptureConformance)' -v

  test:
    desc: Run all tests that do not require hardware
    deps: [test:unit, test:integration]

  build:
    desc: Build backend, simulator, and frontend
    cmds:
      - mkdir -p bin
      - go build -o bin/pet-caen-daq ./backend/cmd/pet-caen-daq
      - go build -o bin/caen-simulator ./backend/cmd/caen-simulator
      - go build -o bin/catalog-ops ./backend/cmd/catalog-ops
      - npm --prefix frontend run build

  build:hdf5:
    desc: Build the production backend with HDF5 storage in the pinned toolchain
    cmds:
      - mkdir -p bin
      - go build -tags hdf5 -o bin/pet-caen-daq ./backend/cmd/pet-caen-daq
      - go build -o bin/caen-simulator ./backend/cmd/caen-simulator
      - go build -o bin/catalog-ops ./backend/cmd/catalog-ops
      - npm --prefix frontend run build

  dev:frontend:
    desc: Start the frontend development server (proxies API to localhost:8080)
    cmds:
      - npm --prefix frontend run dev

  hardware:inspect:
    desc: Read and validate an already-ready DT5215/DT5202 topology without hardware writes
    vars:
      CONFIG: '{{default "test/fixtures/janus/config_same4_v3_good.txt" .CONFIG}}'
      CONTROL: '{{default "172.16.0.11:9760" .CONTROL}}'
      STREAM: '{{default "172.16.0.11:9000" .STREAM}}'
    cmds:
      - go run ./backend/cmd/pet-caen-daq -inspect-only -config "{{.CONFIG}}" -control "{{.CONTROL}}" -stream "{{.STREAM}}"

  test:e2e:
    desc: Build and run Playwright browser tests in the pinned Docker image
    deps: [build]
    cmds:
      - docker run --rm --network host -v "{{.ROOT_DIR}}:/workspace:ro" -w /workspace/frontend mcr.microsoft.com/playwright:v1.61.1-noble npm run test:e2e

  test:e2e:ci:
    desc: Run Playwright browser tests with an installed local Chromium
    deps: [build]
    cmds:
      - npm --prefix frontend run test:e2e

  build-win:
    desc: Build backend and simulator commands for Windows on amd64
    env:
      GOOS: windows
      GOARCH: amd64
      CGO_ENABLED: "0"
    cmds:
      - mkdir -p bin
      - go build -o bin/pet-caen-daq.exe ./backend/cmd/pet-caen-daq
      - go build -o bin/caen-simulator.exe ./backend/cmd/caen-simulator
      - go build -o bin/catalog-ops.exe ./backend/cmd/catalog-ops

  catalog:check:
    desc: Compare the SQLite run catalog with authoritative manifests without repairing it
    vars:
      RUNS: '{{default "./runs" .RUNS}}'
      CATALOG: '{{default (printf "%s/catalog.sqlite3" .RUNS) .CATALOG}}'
    cmds:
      - go run ./backend/cmd/catalog-ops check -runs "{{.RUNS}}" -catalog "{{.CATALOG}}"

  catalog:rebuild:
    desc: Rebuild and atomically replace the SQLite run catalog from authoritative manifests
    vars:
      RUNS: '{{default "./runs" .RUNS}}'
      CATALOG: '{{default (printf "%s/catalog.sqlite3" .RUNS) .CATALOG}}'
    cmds:
      - go run ./backend/cmd/catalog-ops rebuild -runs "{{.RUNS}}" -catalog "{{.CATALOG}}"

  catalog:backup:
    desc: Back up a stopped backend's SQLite run catalog to a new file
    requires:
      vars: [DEST]
    vars:
      RUNS: '{{default "./runs" .RUNS}}'
      CATALOG: '{{default (printf "%s/catalog.sqlite3" .RUNS) .CATALOG}}'
    cmds:
      - go run ./backend/cmd/catalog-ops backup -catalog "{{.CATALOG}}" -destination "{{.DEST}}"

  ci:
    desc: Run the required local equivalent of CI
    deps: [lint, test, build]

  docker:image:
    desc: Build the pinned Go, Node, HDF5, Blosc, Buf, and ConnectRPC toolchain image
    cmds:
      - docker build -t "{{.BUILD_IMAGE}}" -f deploy/docker/Dockerfile.build .

  docker:run:
    desc: Run an arbitrary command in the build image (pass it after --)
    requires:
      vars: [CLI_ARGS]
    cmds:
      - PET_CAEN_BUILD_IMAGE="{{.BUILD_IMAGE}}" ./scripts/docker-run {{.CLI_ARGS}}

  docker:shell:
    desc: Open an interactive shell in the mounted source tree
    cmds:
      - PET_CAEN_BUILD_IMAGE="{{.BUILD_IMAGE}}" ./scripts/docker-run bash

  docker:hdf5:
    desc: Compile and run the HDF5 and Blosc native smoke test in the build image
    cmds:
      - PET_CAEN_BUILD_IMAGE="{{.BUILD_IMAGE}}" ./scripts/docker-run task hdf5:verify

  docker:deps:
    desc: Install pinned frontend dependencies in the mounted source tree
    cmds:
      - PET_CAEN_BUILD_IMAGE="{{.BUILD_IMAGE}}" ./scripts/docker-run npm --prefix frontend ci

  docker:build:
    desc: Compile the backend, simulator, tools, and frontend in the build image
    deps: [docker:deps]
    cmds:
      - PET_CAEN_BUILD_IMAGE="{{.BUILD_IMAGE}}" ./scripts/docker-run task build:hdf5

  docker:test:
    desc: Run backend and frontend tests in the build image
    deps: [docker:deps]
    cmds:
      - PET_CAEN_BUILD_IMAGE="{{.BUILD_IMAGE}}" ./scripts/docker-run task test

  docker:ci:
    desc: Run formatting, linting, tests, and builds in the build image
    deps: [docker:deps]
    cmds:
      - PET_CAEN_BUILD_IMAGE="{{.BUILD_IMAGE}}" ./scripts/docker-run task ci

  docker:verify:
    desc: Verify HDF5/Blosc and compile the complete project in the build image
    deps: [docker:hdf5, docker:build]

  hdf5:verify:
    desc: Compile and run a native HDF5 dataset round trip using the Blosc filter
    cmds:
      - mkdir -p .cache/hdf5-smoke
      - cd .cache/hdf5-smoke && h5cc -Wall -Wextra -Werror -I/usr/local/hdf5-blosc/include ../../scripts/verify-hdf5.c -L/usr/local/hdf5-blosc/lib -lblosc_filter -lblosc -o verify-hdf5
      - .cache/hdf5-smoke/verify-hdf5 .cache/hdf5-smoke/blosc-round-trip.h5
      - h5dump .cache/hdf5-smoke/blosc-round-trip.h5 >/dev/null
      - rm .cache/hdf5-smoke/blosc-round-trip.h5
      - go test -tags hdf5 ./backend/internal/hdf5store ./backend/internal/runpipeline ./test/hdf5 -v
