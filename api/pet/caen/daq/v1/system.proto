syntax = "proto3";

package pet.caen.daq.v1;

import "google/protobuf/timestamp.proto";

option go_package = "github.com/jmbenlloch/pet-caen-daq/backend/gen/pet/caen/daq/v1;daqv1";

// SystemService exposes point-in-time health/configuration queries and a
// reconnect-safe stream of complete telemetry snapshots.
service SystemService {
  rpc GetSystemSnapshot(GetSystemSnapshotRequest) returns (GetSystemSnapshotResponse) {}
  rpc GetConfigurationTemplate(GetConfigurationTemplateRequest) returns (GetConfigurationTemplateResponse) {}
  rpc ValidateConfiguration(ValidateConfigurationRequest) returns (ValidateConfigurationResponse) {}
  rpc StreamTelemetry(StreamTelemetryRequest) returns (stream StreamTelemetryResponse) {}
  rpc SetHighVoltage(SetHighVoltageRequest) returns (SetHighVoltageResponse) {}
}

// RunService owns coarse run-control operations. Register-level access is
// deliberately excluded from the normal operator contract.
service RunService {
  rpc StartRun(StartRunRequest) returns (StartRunResponse) {}
  rpc StopRun(StopRunRequest) returns (StopRunResponse) {}
  rpc ListRuns(ListRunsRequest) returns (ListRunsResponse) {}
  rpc SearchRuns(SearchRunsRequest) returns (SearchRunsResponse) {}
  rpc DownloadArtifact(DownloadArtifactRequest) returns (stream DownloadArtifactResponse) {}
  rpc GetHistograms(GetHistogramsRequest) returns (GetHistogramsResponse) {}
}

message GetSystemSnapshotRequest {}

message GetConfigurationTemplateRequest {}

message GetConfigurationTemplateResponse {
  // Exact JANUS configuration loaded by the backend at startup. The frontend
  // edits this document and submits the resulting text for normal validation.
  string janus_configuration = 1;
}

message GetSystemSnapshotResponse {
  // Deprecated discovery-slice fields retained for wire compatibility.
  string instance_id = 1 [deprecated = true];
  SystemState state = 2 [deprecated = true];
  repeated Chain chains = 3 [deprecated = true];
  TelemetrySnapshot snapshot = 4;
}

message ValidateConfigurationRequest {
  string janus_configuration = 1;
}

message ValidateConfigurationResponse {
  bool valid = 1;
  // Deprecated in favor of structured issues.
  repeated string errors = 2 [deprecated = true];
  repeated ValidationIssue issues = 3;
}

message ValidationIssue {
  ValidationSeverity severity = 1;
  string field = 2;
  uint32 source_line = 3;
  string message = 4;
}

enum ValidationSeverity {
  VALIDATION_SEVERITY_UNSPECIFIED = 0;
  VALIDATION_SEVERITY_WARNING = 1;
  VALIDATION_SEVERITY_ERROR = 2;
}

message StreamTelemetryRequest {}

message StreamTelemetryResponse {
  // Every response is independently usable. The first response on each new
  // stream is a full snapshot and replaces all client-side telemetry state.
  TelemetrySnapshot snapshot = 1;
}

message SetHighVoltageRequest {
  // Empty applies to all configured boards; otherwise these are chain/board indices.
  repeated uint32 boards = 1;
  bool enabled = 2;
  string requested_by = 3;
}

message SetHighVoltageResponse {
  TelemetrySnapshot snapshot = 1;
}

message StartRunRequest {
  string run_id = 1;
  string janus_configuration = 2;
  bool capture_raw = 3;
  bool journal_transport = 4;
  string requested_by = 5;
}

message StartRunResponse {
  RunSummary run = 1;
  TelemetrySnapshot snapshot = 2;
}

message StopRunRequest {
  string run_id = 1;
  string requested_by = 2;
}

message StopRunResponse {
  RunSummary run = 1;
  TelemetrySnapshot snapshot = 2;
}

message ListRunsRequest {
  // Zero uses the server default. Servers may enforce a lower maximum.
  uint32 limit = 1;
}

message ListRunsResponse {
  // Runs are ordered newest first using completion time, then start time and ID.
  repeated RunSummary runs = 1;
}

message SearchRunsRequest {
  repeated ConfigurationPredicate configuration = 1;
  google.protobuf.Timestamp started_after = 2;
  google.protobuf.Timestamp started_before = 3;
  string termination_reason = 4;
  uint64 minimum_event_count = 5;
  // Zero uses the server default. The maximum is 100.
  uint32 limit = 6;
  // Opaque cursor returned by the preceding response.
  string page_token = 7;
}

message SearchRunsResponse {
  repeated RunSummary runs = 1;
  string next_page_token = 2;
}

enum ConfigurationLayer {
  CONFIGURATION_LAYER_UNSPECIFIED = 0;
  CONFIGURATION_LAYER_REQUESTED = 1;
  CONFIGURATION_LAYER_RESOLVED = 2;
}

message ConfigurationPredicate {
  string parameter = 1;
  ConfigurationLayer layer = 2;
  ConfigurationScope scope = 3;
  oneof comparison {
    IntegerComparison integer = 4;
    RealComparison real = 5;
    TextComparison text = 6;
  }
}

message ConfigurationScope {
  // An absent scope searches every scope. Global must be explicitly true.
  oneof scope {
    bool global = 1;
    uint32 board = 2;
    BoardChannelScope channel = 3;
  }
}

message BoardChannelScope {
  uint32 board = 1;
  uint32 channel = 2;
}

message IntegerComparison {
  optional int64 equal = 1;
  optional int64 minimum = 2;
  optional int64 maximum = 3;
}

message RealComparison {
  optional double equal = 1;
  optional double minimum = 2;
  optional double maximum = 3;
}

message TextComparison {
  string equal = 1;
}

message DownloadArtifactRequest {
  string run_id = 1;
  string artifact_name = 2;
}

message DownloadArtifactResponse {
  bytes data = 1;
}

message GetHistogramsRequest {
  string run_id = 1;
  HistogramKind kind = 2;
  repeated HistogramSelection selections = 3;
}

message HistogramSelection {
  uint32 chain = 1;
  uint32 node = 2;
  uint32 channel = 3;
}

enum HistogramKind {
  HISTOGRAM_KIND_UNSPECIFIED = 0;
  HISTOGRAM_KIND_PHA_HIGH_GAIN = 1;
  HISTOGRAM_KIND_PHA_LOW_GAIN = 2;
  HISTOGRAM_KIND_TOA = 3;
  HISTOGRAM_KIND_TOT = 4;
}

message GetHistogramsResponse {
  string run_id = 1;
  HistogramKind kind = 2;
  repeated HistogramDataset datasets = 3;
}

message HistogramDataset {
  uint32 chain = 1;
  uint32 node = 2;
  uint32 channel = 3;
  double minimum = 4;
  double bin_width = 5;
  repeated uint64 bins = 6;
  uint64 entries = 7;
  uint64 underflow = 8;
  uint64 overflow = 9;
}

message TelemetrySnapshot {
  string instance_id = 1;
  uint64 sequence = 2;
  google.protobuf.Timestamp observed_at = 3;
  SystemState state = 4;
  RunSummary current_run = 5;
  repeated Chain chains = 6;
  PipelineTelemetry pipeline = 7;
  StorageTelemetry storage = 8;
  repeated Diagnostic diagnostics = 9;
  StatisticsTelemetry statistics = 10;
  RunSummary latest_completed_run = 11;
}

message StatisticsTelemetry {
  // Cumulative counters for the current run. Clients derive interval views by
  // subtracting snapshots, so changing display mode never mutates acquisition.
  uint64 elapsed_milliseconds = 1;
  repeated BoardStatistics boards = 2;
}

message BoardStatistics {
  uint32 chain = 1;
  uint32 node = 2;
  uint64 timestamp = 3;
  uint64 trigger_id = 4;
  uint64 trigger_count = 5;
  uint64 lost_trigger_count = 6;
  uint64 event_build_count = 7;
  uint64 data_bytes = 8;
  repeated uint64 channel_trigger_counts = 9;
  repeated uint64 timestamp_counts = 10;
  repeated uint64 pha_counts = 11;
}

enum SystemState {
  SYSTEM_STATE_UNSPECIFIED = 0;
  SYSTEM_STATE_DISCONNECTED = 1;
  SYSTEM_STATE_IDLE = 2;
  SYSTEM_STATE_FAULT = 3;
  SYSTEM_STATE_CONNECTING = 4;
  SYSTEM_STATE_CONFIGURING = 5;
  SYSTEM_STATE_READY = 6;
  SYSTEM_STATE_STARTING = 7;
  SYSTEM_STATE_RUNNING = 8;
  SYSTEM_STATE_STOPPING = 9;
  SYSTEM_STATE_DRAINING = 10;
  SYSTEM_STATE_RECOVERING = 11;
}

message RunSummary {
  string run_id = 1;
  google.protobuf.Timestamp started_at = 2;
  google.protobuf.Timestamp completed_at = 3;
  string termination_reason = 4;
  uint64 event_count = 5;
  uint64 raw_batch_count = 6;
  bool incomplete = 7;
  repeated Artifact artifacts = 8;
  string stop_mode = 9;
  uint64 preset_time_milliseconds = 10;
  uint64 preset_event_count = 11;
}

message Artifact {
  string kind = 1;
  string name = 2;
  uint64 size_bytes = 3;
  string sha256 = 4;
}

message Chain {
  uint32 index = 1;
  bool enabled = 2;
  HealthStatus health = 3;
  repeated Board boards = 4;
}

message Board {
  uint32 node = 1;
  uint32 product_id = 2;
  uint32 fpga_firmware = 3;
  HealthStatus health = 4;
  double fpga_temperature_c = 5;
  double board_temperature_c = 6;
  double detector_temperature_c = 7;
  double hv_voltage_v = 8;
  double hv_current_a = 9;
  bool hv_on = 10;
  uint64 event_count = 11;
  double hv_temperature_c = 12;
  bool hv_ramping = 13;
  bool hv_over_current = 14;
  bool hv_over_voltage = 15;
  // Wall-clock time when service telemetry was last received from this board.
  google.protobuf.Timestamp telemetry_observed_at = 16;
}

enum HealthStatus {
  HEALTH_STATUS_UNSPECIFIED = 0;
  HEALTH_STATUS_UNKNOWN = 1;
  HEALTH_STATUS_OK = 2;
  HEALTH_STATUS_DEGRADED = 3;
  HEALTH_STATUS_FAULT = 4;
}

message PipelineTelemetry {
  uint64 queue_capacity = 1;
  uint64 queue_depth = 2;
  uint64 accepted_batches = 3;
  uint64 rejected_batches = 4;
  uint64 decoded_events = 5;
  uint64 decode_failures = 6;
}

message StorageTelemetry {
  HealthStatus health = 1;
  string run_directory = 2;
  uint64 bytes_written = 3;
  uint64 pending_bytes = 4;
  string last_error = 5;
}

message Diagnostic {
  DiagnosticSeverity severity = 1;
  string code = 2;
  string message = 3;
  string chain = 4;
  string node = 5;
  google.protobuf.Timestamp observed_at = 6;
}

enum DiagnosticSeverity {
  DIAGNOSTIC_SEVERITY_UNSPECIFIED = 0;
  DIAGNOSTIC_SEVERITY_INFO = 1;
  DIAGNOSTIC_SEVERITY_WARNING = 2;
  DIAGNOSTIC_SEVERITY_ERROR = 3;
}
